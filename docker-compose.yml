# KAG (Knowledge Augmentation Generation) - Основной Docker Compose файл
# Поддерживаемые профили: dev, prod, monitoring

services:
  # ===========================================
  # Основные сервисы приложения
  # ===========================================
  
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kag-api
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    environment:
      - FASTAPI_HOST=${FASTAPI_HOST:-0.0.0.0}
      - FASTAPI_PORT=${FASTAPI_PORT:-8000}
      - FASTAPI_DEBUG=${FASTAPI_DEBUG:-false}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-kag}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-kag-api}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-change_me}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      # Keycloak DB (PostgreSQL для конфигов)
      - KC_DB_USERNAME=${KC_DB_USERNAME:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak_password}
      - KC_DB_HOST=keycloak-db
      - KC_DB_PORT=5432
      - KC_DB_NAME=keycloak
      # LLM конфигурация - Ollama на удаленном сервере
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.50.41:11434}
      - OLLAMA_MODEL=phi4-mini:latest
      - OLLAMA_TIMEOUT=180.0
      - OLLAMA_KEEP_ALIVE=24h
      - LLM_OLLAMA_ENABLED=true
      - LLM_OLLAMA_PRIORITY=0
      # vLLM (опционально)
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://vllm:8000}
      - VLLM_MODEL_NAME=${VLLM_MODEL_NAME:-mistralai/Mistral-7B-Instruct-v0.2}
      - LLM_VLLM_ENABLED=${LLM_VLLM_ENABLED:-false}
      - LLM_VLLM_PRIORITY=1
      # Embedding модели
      - EMBEDDING_BASE_URL=${OLLAMA_BASE_URL:-http://192.168.50.41:11434}
      - EMBEDDING_MODEL=nomic-embed-text:latest
      - EMBEDDING_TIMEOUT=60.0
      - EMBEDDING_DIMENSIONS=768
      # Общие настройки
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-mistral:7b}
      - LLM_MAX_TOKENS=4096
      - LLM_TEMPERATURE=0.7
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./user_data:/app/user_data
      - ${DOCKER_SOCKET:-/dev/null}:/var/run/docker.sock
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      keycloak-db:
        condition: service_started
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - dev
      - prod

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: kag-worker
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "celery", "-A", "src.indexing.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - dev
      - prod

  # ===========================================
  # MCP Сервер для тестирования
  # ===========================================
  
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: kag-mcp
    ports:
      - "8001:8001"
    environment:
      - API_URL=http://api:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - api
      - redis
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - dev

  # ===========================================
  # Векторная база данных Qdrant
  # ===========================================
  
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: kag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    profiles:
      - dev
      - prod

  # ===========================================
  # Redis - кэш и брокер сообщений
  # ===========================================
  
  redis:
    image: redis:7-alpine
    container_name: kag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - dev
      - prod

  # ===========================================
  # Keycloak - IdP для аутентификации
  # ===========================================
  
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: kag-keycloak
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USERNAME:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak_password}
      - KC_HOSTNAME=localhost
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    command: start-dev --import-realm
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"</dev/tcp/localhost/8080\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - dev
      - prod

  keycloak-db:
    image: postgres:16-alpine
    container_name: kag-keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USERNAME:-keycloak}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD:-keycloak_password}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - dev
      - prod

  # ===========================================
  # Nginx - обратный прокси
  # ===========================================
  
  nginx:
    image: nginx:1.25-alpine
    container_name: kag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - prod

  # ===========================================
  # Мониторинг (профиль monitoring)
  # ===========================================
  
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: kag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - kag_internal
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.0
    container_name: kag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - kag_internal
    restart: unless-stopped
    profiles:
      - monitoring

  loki:
    image: grafana/loki:2.9.0
    container_name: kag-loki
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - kag_internal
    restart: unless-stopped
    profiles:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: kag-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./docker/otel/otel-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - kag_internal
    restart: unless-stopped
    profiles:
      - monitoring

  # ===========================================
  # Планировщик задач
  # ===========================================
  
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kag-scheduler
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: python -c "from src.indexing.scheduler import scheduler; scheduler.initialize(); import asyncio; asyncio.get_event_loop().run_forever()"
    volumes:
      - ./src:/app/src
    depends_on:
      - redis
    networks:
      - kag_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r = redis.Redis(host='redis'); r.ping()"]
      interval: 60s
      timeout: 10s
      retries: 3
    profiles:
      - dev
      - prod

# ===========================================
# Сети
# ===========================================

networks:
  kag_internal:
    driver: bridge
    name: kag_internal

# ===========================================
# Тома данных
# ===========================================

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  keycloak_db_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
