# Проксирование к KAG API
upstream kag_api {
    server api:8000;
    keepalive 32;
}

# Проксирование к MCP серверу
upstream kag_mcp {
    server mcp-server:8001;
    keepalive 16;
}

# HTTP сервер (для продакшена использовать HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy";
        add_header Content-Type text/plain;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        
        proxy_pass http://kag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
        
        # Буферы
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # MCP endpoint
    location /mcp/ {
        limit_req zone=api_limit burst=30 nodelay;
        
        proxy_pass http://kag_mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE поддержка
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        
        # Таймауты для SSE
        proxy_read_timeout 3600s;
    }

    # Upload endpoints
    location /api/v1/upload {
        limit_req zone=upload_limit burst=10 nodelay;
        
        client_max_body_size 500M;
        
        proxy_pass http://kag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты для загрузки
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 600s;
    }

    # Документация API
    location /docs {
        proxy_pass http://kag_api;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://kag_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://kag_api;
        proxy_set_header Host $host;
    }

    # Блокировка доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

