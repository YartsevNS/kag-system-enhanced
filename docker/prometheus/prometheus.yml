# Конфигурация Prometheus
# Сканирует метрики со всех сервисов KAG

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Правила алертинга
rule_files:
  - "/etc/prometheus/rules/*.yml"

# Конфигурация алертов
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Цели для сканирования
scrape_configs:
  # KAG API
  - job_name: "kag-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "kag-api"
          environment: "production"

  # KAG MCP Server
  - job_name: "kag-mcp"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["mcp-server:8001"]
        labels:
          service: "kag-mcp"
          environment: "production"

  # Qdrant
  - job_name: "qdrant"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: "qdrant"
          environment: "production"

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          service: "redis"
          environment: "production"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          environment: "production"
