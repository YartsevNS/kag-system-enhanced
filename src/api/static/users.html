<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAG — Пользователи и группы</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent-h:#7170ff;--green:#27a644;--red:#dc2626;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
nav{width:240px;background:var(--panel);border-right:1px solid var(--border-s);position:fixed;height:100vh;padding:20px 0}
nav .logo{padding:0 24px 20px;font-size:18px;font-weight:600;letter-spacing:-0.4px;border-bottom:1px solid var(--border-s);margin-bottom:12px}
nav .logo span{color:var(--accent-h)}
nav a{display:flex;align-items:center;gap:10px;padding:8px 24px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s}
nav a:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
nav a.active{color:var(--text);background:rgba(255,255,255,0.06)}
main{margin-left:240px;flex:1;padding:32px 40px;max-width:1000px}
h1{font-size:28px;font-weight:600;letter-spacing:-0.6px;margin-bottom:8px}
.sub{font-size:15px;color:var(--text3);margin-bottom:28px}
.section{margin-bottom:32px}
.section-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius);padding:20px}
/* Form */
.form{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
input{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;min-width:160px}
input:focus{border-color:var(--accent-h)}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.btn-sm{background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border-s);padding:5px 10px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer}
.btn-sm:hover{color:var(--text2)}
/* Table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;border-bottom:1px solid var(--border-s)}
td{padding:10px 14px;font-size:14px;color:var(--text2);border-bottom:1px solid var(--border-s)}
.badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:500}
.badge.admin{background:rgba(113,112,255,0.15);color:var(--accent-h)}
.badge.user{background:rgba(255,255,255,0.05);color:var(--text3)}
.badge.group{background:rgba(16,185,129,0.15);color:var(--emerald)}
.empty{text-align:center;padding:40px;color:var(--text4);font-size:14px}
@media(max-width:768px){nav{width:60px}nav a span,nav .logo{display:none}main{margin-left:60px;padding:20px 16px}.form{flex-direction:column}}
</style>
</head>
<body>
<nav>
  <div class="logo">🎯 <span>KAG</span></div>
  <a href="/">⬡ Дашборд</a>
  <a href="/chat">💬 Чат с AI</a>
  <a href="/documents">📄 Документы</a>
  <a href="/ocr">🔍 OCR-демо</a>
  <a href="/monitoring">📡 Мониторинг</a>
  <a href="/users" class="active">👥 Пользователи</a>
  <a href="/admin">⚙️ Админ</a>
</nav>

<main>
  <h1>👥 Пользователи и группы</h1>
  <div class="sub">Управление доступом: регистрация, группы, RBAC</div>

  <div class="section">
    <div class="section-title">📝 Регистрация пользователя</div>
    <div class="card">
      <div class="form">
        <input type="text" id="reg-username" placeholder="Логин" autocomplete="off">
        <input type="password" id="reg-password" placeholder="Пароль (мин 6 символов)" autocomplete="off">
        <input type="email" id="reg-email" placeholder="Email (необязательно)" autocomplete="off">
        <button class="btn" onclick="register()">Зарегистрировать</button>
      </div>
      <div id="reg-status" style="font-size:13px;color:var(--text3)"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">👤 Пользователи</div>
    <div class="card"><div id="users-list"><div class="empty">Загрузка...</div></div></div>
  </div>

  <div class="section">
    <div class="section-title">👥 Группы</div>
    <div class="card">
      <div id="groups-list"><div class="empty">Загрузка...</div></div>
      <div class="form" style="margin-top:12px;margin-bottom:0">
        <input type="text" id="group-name" placeholder="Название группы">
        <button class="btn" onclick="createGroup()">+ Создать группу</button>
      </div>
    </div>
  </div>
</main>

<script>
const API = '/api/v1';

async function register() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value;
  const e = document.getElementById('reg-email').value.trim();
  if (!u || !p) { document.getElementById('reg-status').textContent = 'Заполните логин и пароль'; return; }
  try {
    const res = await fetch(`${API}/auth/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p, email:e||null})
    });
    const data = await res.json();
    const el = document.getElementById('reg-status');
    if (res.ok) { el.style.color='var(--green)'; el.textContent = '✅ Пользователь создан: ' + data.username; loadUsers(); }
    else { el.style.color='var(--red)'; el.textContent = '❌ ' + (data.detail || data.message); }
  } catch(err) { document.getElementById('reg-status').textContent = 'Ошибка: ' + err.message; }
}

async function loadUsers() {
  try {
    const res = await fetch(`${API}/admin/users`);
    const users = await res.json();
    const c = document.getElementById('users-list');
    if (!users || !users.length) { c.innerHTML = '<div class="empty">Нет пользователей</div>'; return; }
    c.innerHTML = `<table><tr><th>Логин</th><th>Email</th><th>Роль</th><th>Активен</th><th>Создан</th></tr>
      ${users.map(u => `<tr>
        <td style="font-weight:500">${u.username}</td>
        <td style="color:var(--text4)">${u.email || '—'}</td>
        <td><span class="badge ${u.is_admin ? 'admin' : 'user'}">${u.is_admin ? 'Админ' : 'User'}</span></td>
        <td>${u.is_active ? '✅' : '❌'}</td>
        <td style="color:var(--text4);font-size:12px">${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
      </tr>`).join('')}</table>`;
  } catch(e) { document.getElementById('users-list').innerHTML = '<div class="empty">Ошибка</div>'; }
}

async function loadGroups() {
  try {
    const res = await fetch(`${API}/admin/groups`);
    const groups = await res.json();
    const c = document.getElementById('groups-list');
    if (!groups || !groups.length) { c.innerHTML = '<div class="empty">Нет групп</div>'; return; }
    c.innerHTML = `<table><tr><th>Название</th><th>Описание</th></tr>
      ${groups.map(g => `<tr><td style="font-weight:500"><span class="badge group">${g.name}</span></td><td style="color:var(--text4)">${g.description || '—'}</td></tr>`).join('')}</table>`;
  } catch(e) { document.getElementById('groups-list').innerHTML = '<div class="empty">Ошибка</div>'; }
}

async function createGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name) return;
  try {
    await fetch(`${API}/admin/groups`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, description:''})
    });
    document.getElementById('group-name').value = '';
    loadGroups();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

loadUsers(); loadGroups();
</script>
</body>
</html>
