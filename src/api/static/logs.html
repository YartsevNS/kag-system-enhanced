<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAG — Логи</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--green:#27a644;--emerald:#10b981;--red:#dc2626;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
nav{width:240px;background:var(--panel);border-right:1px solid var(--border-s);position:fixed;height:100vh;padding:20px 0}
nav .logo{padding:0 24px 20px;font-size:18px;font-weight:600;border-bottom:1px solid var(--border-s);margin-bottom:12px}
nav .logo span{color:var(--accent)}
nav a{display:flex;align-items:center;gap:10px;padding:8px 24px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s}
nav a:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
nav a.active{color:var(--text);background:rgba(255,255,255,0.06)}
main{margin-left:240px;flex:1;padding:32px 40px;max-width:1100px}
h1{font-size:28px;font-weight:600;letter-spacing:-0.6px;margin-bottom:4px}
.sub{font-size:15px;color:var(--text3);margin-bottom:24px}
/* Log lines */
.log-container{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius);overflow:hidden;max-height:70vh;overflow-y:auto}
.log-entry{display:flex;padding:8px 16px;border-bottom:1px solid var(--border-s);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--text4);min-width:90px;flex-shrink:0}
.log-level{min-width:60px;flex-shrink:0;font-weight:600}
.log-level.INFO{color:var(--text2)}
.log-level.WARNING{color:#fbbf24}
.log-level.ERROR{color:var(--red)}
.log-level.DEBUG{color:var(--text4)}
.log-msg{color:var(--text2);word-break:break-all}
/* Controls */
.controls{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.controls select,.controls button{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif}
.controls button{background:var(--accent);border:none;font-weight:600}
.controls button:hover{opacity:0.85}
.empty{text-align:center;padding:40px;color:var(--text4)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){nav{width:60px}nav a span,nav .logo{display:none}main{margin-left:60px;padding:16px}}
</style>
</head>
<body>
<nav>
  <div class="logo">🎯 <span>KAG</span></div>
  <a href="/">⬡ Дашборд</a>
  <a href="/chat">💬 Чат с AI</a>
  <a href="/documents">📄 Документы</a>
  <a href="/ocr">🔍 OCR-демо</a>
  <a href="/monitoring">📡 Мониторинг</a>
  <a href="/logs" class="active">📋 Логи</a>
  <a href="/users">👥 Пользователи</a>
  <a href="/admin">⚙️ Админ</a>
</nav>

<main>
  <h1>📋 Логи системы</h1>
  <div class="sub" id="log-info">Загрузка...</div>
  <div class="controls">
    <select id="level-filter" onchange="loadLogs()">
      <option value="">Все уровни</option>
      <option value="INFO">INFO</option>
      <option value="WARNING">WARNING</option>
      <option value="ERROR">ERROR</option>
    </select>
    <button onclick="loadLogs()">🔄 Обновить</button>
    <span style="font-size:13px;color:var(--text4)" id="auto-refresh"></span>
  </div>
  <div class="log-container" id="log-container">
    <div class="empty"><div class="spinner"></div></div>
  </div>
</main>

<script>
async function loadLogs() {
  const container = document.getElementById('log-container');
  const filter = document.getElementById('level-filter').value;
  container.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
  
  try {
    // Fetch logs from API
    const resp = await fetch('/api/v1/admin/audit-log?limit=200');
    const data = await resp.json();
    
    if (data.logs && data.logs.length) {
      const filtered = filter ? data.logs.filter(l => l.level === filter) : data.logs;
      container.innerHTML = filtered.slice(-100).map(l => `
        <div class="log-entry">
          <span class="log-time">${l.timestamp || l.created_at || ''}</span>
          <span class="log-level ${l.level || 'INFO'}">${l.level || 'INFO'}</span>
          <span class="log-msg">${l.message || l.action || JSON.stringify(l)}</span>
        </div>
      `).join('') || '<div class="empty">Нет записей</div>';
      document.getElementById('log-info').textContent = `Всего: ${data.logs.length} записей`;
    } else {
      container.innerHTML = '<div class="empty">Логи пока пусты — загрузите документ или выполните поиск</div>';
    }
  } catch(e) {
    container.innerHTML = '<div class="empty">Ошибка загрузки: ' + e.message + '</div>';
  }
  
  document.getElementById('auto-refresh').textContent = 'Авто: 30с';
}

loadLogs();
setInterval(loadLogs, 30000);
</script>
</body>
</html>
