<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAG — Docker & Сервер</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--elevated:#23252a;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent-h:#7170ff;--green:#10b981;--emerald:#10b981;--red:#ef4444;--amber:#f59e0b;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px;--radius-lg:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;line-height:1.5}
nav{width:240px;background:var(--panel);border-right:1px solid var(--border-s);position:fixed;height:100vh;z-index:10;padding:20px 0;overflow-y:auto}
nav .logo{padding:0 24px 20px;font-size:18px;font-weight:600;letter-spacing:-0.4px;border-bottom:1px solid var(--border-s);margin-bottom:12px}
nav .logo span{color:var(--accent-h)}
nav a{display:flex;align-items:center;gap:10px;padding:8px 24px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s}
nav a:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
nav a.active{color:var(--text);background:rgba(255,255,255,0.06)}
main{margin-left:240px;flex:1;padding:24px 32px;max-width:1500px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:var(--text4);margin-bottom:18px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius);padding:14px 16px}
.stat .val{font-size:24px;font-weight:700;color:var(--text)}
.stat .lbl{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px}
.panel{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px}
.panel h2{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--text4);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:0.03em;border-bottom:1px solid var(--border-s);background:var(--panel)}
td{padding:8px 10px;color:var(--text2);border-bottom:1px solid var(--border-s);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.015)}
.badge{display:inline-block;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:500}
.badge-ok{background:rgba(16,185,129,0.15);color:var(--green)}
.badge-warn{background:rgba(245,158,11,0.15);color:var(--amber)}
.badge-err{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-info{background:rgba(94,106,210,0.12);color:var(--accent-h)}
.bar{width:100%;height:4px;background:var(--elevated);border-radius:2px;margin-top:3px;overflow:hidden}
.bar .fill{height:100%;border-radius:2px;transition:width 0.5s}
.fill-ok{background:var(--green)}.fill-warn{background:var(--amber)}.fill-err{background:var(--red)}
.btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;margin-right:4px}
.btn:hover{opacity:0.85}
.btn-sm{background:var(--elevated);color:var(--text3);border:1px solid var(--border);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;margin:1px}
.btn-sm:hover{color:var(--text);border-color:var(--text4)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.loading{text-align:center;padding:30px;color:var(--text4)}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent-h);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){nav{width:60px}nav a span,nav .logo{display:none}main{margin-left:60px;padding:14px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav>
  <div class="logo">🎯 <span>KAG</span></div>
  <a href="/">⬡ Дашборд</a>
  <a href="/documents">📄 Документы</a>
  <a href="/chunks">🧩 Чанки</a>
  <a href="/search">🔎 Поиск</a>
  <a href="/kg">🕸️ Граф знаний</a>
  <a href="/logs">📋 Логи</a>
  <a href="/admin">⚙️ Админ</a>
  <a href="/docs">📖 Документация</a>
</nav>
<main>
<h1>🐳 Docker & Сервер</h1>
<div class="sub">Все контейнеры, ресурсы, системная информация — автообновление 5с</div>

<div class="stats" id="stats-row"><div class="loading"><div class="spin"></div></div></div>

<div class="panel">
  <h2>📦 Контейнеры <button class="btn" onclick="loadAll()" style="float:right;font-size:11px">🔄</button></h2>
  <div id="containers"><div class="loading"><div class="spin"></div> Загрузка...</div></div>
</div>

<div class="panel">
  <h2>💾 Диски</h2>
  <div id="disks"><div class="loading"><div class="spin"></div></div></div>
</div>

<div class="panel">
  <h2>🌐 Сеть</h2>
  <div id="network"><div class="loading"><div class="spin"></div></div></div>
</div>

<div class="panel">
  <h2>📋 Процессы (top-10 по памяти)</h2>
  <div id="processes"><div class="loading"><div class="spin"></div></div></div>
</div>
</main>

<script>
async function loadAll() {
  try {
    const [sysR, dockerR, duR] = await Promise.all([
      fetch('/api/v1/admin/models/system/info').then(r=>r.json()).catch(()=>null),
      fetch('/api/v1/admin/models/docker/stats').then(r=>r.json()).catch(()=>null),
      fetch('/api/v1/admin/disk-usage').then(r=>r.json()).catch(()=>null)
    ]);
    if (sysR && !sysR.error) renderSystem(sysR);
    if (dockerR) renderDocker(dockerR);
    if (duR) renderDiskUsage(duR);
  } catch(e) { console.error(e); }
}

function fillClass(v, w, c) { return v >= c ? 'fill-err' : v >= w ? 'fill-warn' : 'fill-ok'; }
function fmt(b) { if(!b)return'0B'; const k=1024,s=['B','KB','MB','GB','TB']; const i=Math.floor(Math.log(b)/Math.log(k)); return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]; }
function pct(v,t) { return t ? (v/t*100).toFixed(1)+'%' : '—'; }

function renderSystem(d) {
  const cpu = d.cpu || {}, mem = d.memory || {}, os = d.os || {};
  document.getElementById('stats-row').innerHTML = 
    `<div class="stat"><div class="val">${d.hostname||'?'}</div><div class="lbl">Хост</div></div>
    <div class="stat"><div class="val">${os.system||'?'} ${os.release||''}</div><div class="lbl">ОС</div></div>
    <div class="stat"><div class="val">${(cpu.usage_percent||0).toFixed(0)}%</div><div class="lbl">CPU</div><div class="bar"><div class="fill ${fillClass(cpu.usage_percent,50,80)}" style="width:${Math.min(cpu.usage_percent||0,100)}%"></div></div></div>
    <div class="stat"><div class="val">${cpu.physical_cores||'?'} / ${cpu.logical_cores||'?'}</div><div class="lbl">Ядер / Потоков</div></div>
    <div class="stat"><div class="val">${pct(mem.used,mem.total)}</div><div class="lbl">RAM ${fmt(mem.used)}/${fmt(mem.total)}</div><div class="bar"><div class="fill ${fillClass(mem.percent,70,90)}" style="width:${Math.min(mem.percent||0,100)}%"></div></div></div>
    <div class="stat"><div class="val">${(d.uptime||0)>86400?Math.floor(d.uptime/86400)+'д':'—'}</div><div class="lbl">Uptime</div></div>`;

  // Disks
  const disks = d.disk || [];
  document.getElementById('disks').innerHTML = disks.length ? 
    '<table><thead><tr><th>Устройство</th><th>Точка</th><th>ФС</th><th>Размер</th><th>Исп.</th><th>Своб.</th><th>%</th></tr></thead><tbody>'+
    disks.map(dd => `<tr><td class="mono">${dd.device}</td><td>${dd.mountpoint}</td><td>${dd.fstype}</td><td>${fmt(dd.total)}</td><td>${fmt(dd.used)}</td><td>${fmt(dd.free)}</td><td><span class="badge ${dd.percent>90?'badge-err':dd.percent>70?'badge-warn':'badge-ok'}">${dd.percent.toFixed(0)}%</span></td></tr>`).join('')+
    '</tbody></table>' : '<span style="color:var(--text4)">Нет данных</span>';

  // Network
  const net = d.network || {};
  const netKeys = Object.keys(net);
  document.getElementById('network').innerHTML = netKeys.length ?
    '<table><thead><tr><th>Интерфейс</th><th>↓ Принято</th><th>↑ Отправлено</th><th>Пакетов ↓</th><th>Пакетов ↑</th><th>Ошибки</th></tr></thead><tbody>'+
    netKeys.map(k => { const s=net[k]; return `<tr><td class="mono">${k}</td><td>${fmt(s.bytes_recv)}</td><td>${fmt(s.bytes_sent)}</td><td>${s.packets_recv||0}</td><td>${s.packets_sent||0}</td><td><span class="badge ${(s.errin+s.errout)>0?'badge-err':'badge-ok'}">${s.errin+s.errout}</span></td></tr>`; }).join('')+
    '</tbody></table>' : '<span style="color:var(--text4)">Нет данных</span>';

  // Processes
  const procs = d.processes || [];
  document.getElementById('processes').innerHTML = procs.length ?
    '<table><thead><tr><th>PID</th><th>Имя</th><th>CPU%</th><th>RAM</th><th>Статус</th></tr></thead><tbody>'+
    procs.map(p => `<tr><td class="mono">${p.pid}</td><td>${p.name}</td><td>${(p.cpu_percent||0).toFixed(1)}%</td><td>${fmt(p.memory||0)}</td><td><span class="badge badge-info">${p.status||'?'}</span></td></tr>`).join('')+
    '</tbody></table>' : '<span style="color:var(--text4)">Нет данных</span>';
}

function renderDocker(d) {
  const sys = d.system || {};
  document.getElementById('stats-row').innerHTML += 
    `<div class="stat"><div class="val">${sys.containers_running||0}/${sys.containers_total||0}</div><div class="lbl">Контейнеров</div></div>
    <div class="stat"><div class="val">${sys.images_count||0}</div><div class="lbl">Образов</div></div>
    <div class="stat"><div class="val">🐳 ${sys.docker_version||'?'}</div><div class="lbl">Docker</div></div>`;

  const containers = d.containers || [];
  document.getElementById('containers').innerHTML = containers.length ?
    '<table><thead><tr><th>Имя</th><th>Образ</th><th>Статус</th><th>CPU</th><th>RAM</th><th>Сеть ↓/↑</th><th>PID</th><th>Действия</th></tr></thead><tbody>'+
    containers.map(c => {
      const s = c.stats || {};
      const running = c.state === 'running';
      const cpu = (s.cpu_percent||0).toFixed(1);
      return `<tr>
        <td><strong>${c.name}</strong></td>
        <td class="mono" style="font-size:10px">${(c.image||'').split(':')[0]}</td>
        <td><span class="badge ${running?'badge-ok':'badge-err'}">${running?'✅ '+c.status:'⏹ '+c.state}</span></td>
        <td>${cpu}%<div class="bar"><div class="fill ${fillClass(parseFloat(cpu),50,80)}" style="width:${Math.min(parseFloat(cpu),100)}%"></div></div></td>
        <td>${fmt(s.mem_used)}/${fmt(s.mem_limit)}<div class="bar"><div class="fill ${fillClass(s.mem_percent||0,70,90)}" style="width:${Math.min(s.mem_percent||0,100)}%"></div></div></td>
        <td class="mono" style="font-size:10px">↓${fmt(s.net_in)} ↑${fmt(s.net_out)}</td>
        <td class="mono">${s.pids||0}</td>
        <td>${running?`<button class="btn-sm" onclick="act('${c.name}','restart')">🔄</button><button class="btn-sm" onclick="act('${c.name}','stop')">⏹</button>`:`<button class="btn-sm" onclick="act('${c.name}','start')">▶</button>`}<button class="btn-sm" onclick="act('${c.name}','logs')">📋</button></td>
      </tr>`;
    }).join('')+'</tbody></table>' : '<span style="color:var(--text4)">Нет контейнеров</span>';
}

function renderDiskUsage(d) {
  const dirs = d.directories || [];
  if (!dirs.length) return;
  
  // Total size calculation
  let totalBytes = 0;
  const parsed = dirs.map(x => {
    const s = x.size || '0';
    const num = parseFloat(s);
    const mult = s.includes('G') ? 1024*1024*1024 : s.includes('M') ? 1024*1024 : s.includes('K') ? 1024 : 1;
    const bytes = num * mult;
    totalBytes += bytes;
    return {...x, bytes, size: s};
  }).sort((a,b) => b.bytes - a.bytes);
  
  let html = '<table><thead><tr><th>Директория</th><th>Размер</th><th>%</th></tr></thead><tbody>';
  parsed.forEach(p => {
    const pct = totalBytes > 0 ? (p.bytes/totalBytes*100).toFixed(1) : 0;
    const cls = pct > 30 ? 'badge-err' : pct > 15 ? 'badge-warn' : 'badge-ok';
    html += `<tr><td class="mono" style="font-size:11px">${p.path}</td><td><strong>${p.size}</strong></td><td><span class="badge ${cls}">${pct}%</span><div class="bar"><div class="fill ${fillClass(parseFloat(pct),30,60)}" style="width:${Math.min(parseFloat(pct),100)}%"></div></div></td></tr>`;
  });
  html += '</tbody></table>';
  
  if (d.docker_raw && d.docker_raw !== 'Docker недоступен из контейнера') {
    html += '<div style="margin-top:12px"><strong style="font-size:11px;color:var(--text4)">docker system df:</strong><pre class="mono" style="background:var(--elevated);padding:8px;border-radius:4px;margin-top:4px;font-size:10px;max-height:200px;overflow:auto;white-space:pre-wrap">' + d.docker_raw + '</pre></div>';
  }
  
  // Add to disk panel
  document.getElementById('disks').innerHTML += '<div style="margin-top:14px"><h3 style="font-size:13px;color:var(--text2);margin-bottom:8px">📂 Что занимает место (du -sh)</h3>' + html + '</div>';
}

async function act(name, action) {
  if (action === 'logs') {
    try {
      const r = await fetch(`/api/v1/admin/models/docker/${name}/logs?lines=50`);
      const d = await r.json();
      const win = window.open('','_blank','width=900,height=700');
      win.document.write(`<pre style="background:#08090a;color:#d0d6e0;padding:16px;font-family:monospace;font-size:12px;white-space:pre-wrap">${d.logs||'нет логов'}</pre>`);
    } catch(e) { alert(e.message); }
    return;
  }
  if (!confirm(`${action === 'restart' ? 'Перезапустить' : action === 'stop' ? 'Остановить' : 'Запустить'} ${name}?`)) return;
  try {
    await fetch(`/api/v1/admin/models/docker/${name}/${action}`, {method:'POST'});
    setTimeout(loadAll, 2000);
  } catch(e) { alert(e.message); }
}

loadAll();
setInterval(loadAll, 5000);
</script>
</body>
</html>
