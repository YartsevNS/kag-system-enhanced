<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAG — Просмотр документа</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent-h:#7170ff;--accent-l:#828fff;--green:#27a644;--red:#dc2626;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}

nav{width:240px;background:var(--panel);border-right:1px solid var(--border-s);position:fixed;height:100vh;z-index:10;padding:20px 0}
nav .logo{padding:0 24px 20px;font-size:18px;font-weight:600;border-bottom:1px solid var(--border-s);margin-bottom:12px}
nav .logo span{color:var(--accent-h)}
nav a{display:flex;align-items:center;gap:10px;padding:8px 24px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s}
nav a:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
nav a.active{color:var(--text);background:rgba(255,255,255,0.06)}

main{margin-left:240px;flex:1;padding:16px 24px;display:flex;flex-direction:column;min-height:100vh}

.toolbar{display:flex;align-items:center;gap:10px;padding:8px 0;flex-shrink:0;flex-wrap:wrap}
.toolbar .doc-title{font-size:15px;font-weight:600;flex:1;min-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar a,.toolbar button{font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);text-decoration:none;cursor:pointer;font-weight:500;transition:all 0.15s;border:none;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-back{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-back:hover{background:#25272e}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{opacity:0.85}
.btn-ghost{background:rgba(94,106,210,0.1);color:var(--accent-l)}

.meta-bar{display:flex;gap:10px;padding:6px 0 10px;flex-shrink:0;flex-wrap:wrap}
.meta-pill{font-size:11px;color:var(--text4);padding:4px 10px;background:var(--surface);border-radius:9999px;border:1px solid var(--border-s)}
.meta-pill strong{color:var(--text2);font-weight:500}
.tag{font-size:10px;padding:3px 7px;border-radius:9999px;font-weight:500;background:rgba(94,106,210,0.15);color:var(--accent-l)}

.viewer-wrap{flex:1;background:var(--panel);border:1px solid var(--border-s);border-radius:var(--radius);overflow:hidden;position:relative;min-height:500px}
.viewer-wrap iframe{width:100%;height:100%;border:none;background:#525659}

.loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:2;background:var(--panel)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent-h);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){nav{width:60px}nav a span,nav .logo{display:none}main{margin-left:60px;padding:8px}}
</style>
</head>
<body>
<nav>
  <div class="logo">🎯 <span>KAG</span></div>
  <a href="/">⬡ Дашборд</a>
  <a href="/documents" class="active">📄 Документы</a>
  <a href="/search">🔎 Поиск</a>
  <a href="/chunks">🧩 Чанки</a>
  <a href="/logs">📋 Логи</a>
</nav>

<main>
  <div class="toolbar">
    <div class="doc-title" id="doc-title">Загрузка...</div>
    <a href="/documents" class="btn-back">← Назад</a>
    <a href="#" class="btn-ghost" id="btn-chunks" style="display:none">🧩 Чанки</a>
    <a href="#" class="btn-accent" id="btn-download" download>📥 Скачать</a>
  </div>

  <div class="meta-bar" id="meta-bar"></div>

  <div class="viewer-wrap" id="viewer-wrap">
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div style="font-size:14px;color:var(--text3)">Загрузка документа...</div>
    </div>
  </div>
</main>

<script>
const API = '/api/v1';
const params = new URLSearchParams(window.location.search);
const docId = params.get('id');

if (!docId) {
  document.getElementById('doc-title').textContent = '❌ Не указан ID';
  document.getElementById('loading-overlay').innerHTML = '<div style="font-size:14px;color:var(--text3)">Укажите ?id=... в URL</div>';
} else {
  init();
}

async function init() {
  try {
    const r = await fetch(`${API}/upload/${docId}/details`);
    if (!r.ok) {
      if (r.status === 401) throw new Error('Требуется авторизация. Войдите заново.');
      throw new Error('Документ не найден');
    }
    const doc = await r.json();
    
    document.getElementById('doc-title').textContent = doc.recognized_title || doc.filename;
    document.title = 'KAG — ' + (doc.recognized_title || doc.filename);
    
    document.getElementById('btn-chunks').href = `/chunks?doc_id=${docId}&name=${encodeURIComponent(doc.filename)}`;
    document.getElementById('btn-chunks').style.display = 'inline-block';
    document.getElementById('btn-download').href = `${API}/upload/${docId}/preview`;
    
    // Meta
    const tags = (doc.tags||[]).map(t => `<span class="tag">${t}</span>`).join(' ');
    document.getElementById('meta-bar').innerHTML = `
      <div class="meta-pill">Тип: <strong>${typeLabel(doc.document_type)}</strong></div>
      <div class="meta-pill">Размер: <strong>${fmtBytes(doc.file_size)}</strong></div>
      <div class="meta-pill">Чанков: <strong>${doc.chunks_count||0}</strong></div>
      <div class="meta-pill">📅 ${new Date(doc.created_at).toLocaleDateString('ru-RU')}</div>
      ${tags ? `<div class="meta-pill">${tags}</div>` : ''}
    `;
    
    // Load document in iframe — browser handles auth cookie
    const previewUrl = `${API}/upload/${docId}/preview`;
    const viewer = document.getElementById('viewer-wrap');
    const iframe = document.createElement('iframe');
    iframe.src = previewUrl;
    iframe.onload = () => {
      document.getElementById('loading-overlay').style.display = 'none';
    };
    iframe.onerror = () => {
      document.getElementById('loading-overlay').innerHTML = '<div style="font-size:48px">📄</div><div style="color:var(--text3)">Не удалось загрузить документ</div>';
    };
    viewer.appendChild(iframe);
    
    // Fallback: hide loading after 5s
    setTimeout(() => {
      document.getElementById('loading-overlay').style.display = 'none';
    }, 5000);
    
  } catch(e) {
    document.getElementById('doc-title').textContent = '❌ Ошибка';
    document.getElementById('loading-overlay').innerHTML = `
      <div style="font-size:48px;margin-bottom:8px">📄</div>
      <div style="font-size:15px;color:var(--text3)">${e.message}</div>
      <a href="/documents" class="btn-back" style="margin-top:16px;display:inline-block">← К документам</a>
    `;
  }
}

function typeLabel(t) { const m={invoice:'Счёт',contract:'Договор',report:'Отчёт',letter:'Письмо',form:'Форма',identity:'Удостоверение',medical:'Медицинский',legal:'Юридический'}; return m[t]||t||'—'; }
function fmtBytes(b) { if(!b)return'0B';const k=1024;const s=['B','KB','MB','GB'];const i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]; }
</script>
</body>
</html>
