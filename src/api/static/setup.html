<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG - Setup Wizard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        .logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        .step {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .step-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .step-num {
            background: #3b82f6;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .full { grid-column: 1 / -1; }
        
        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .field input, .field select {
            width: 100%;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.25rem;
        }
        
        .btn-test {
            background: #475569;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }
        .btn-test:hover { background: #64748b; }
        
        .test-status {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            border-radius: 4px;
            display: none;
        }
        .test-status.success { background: #064e3b; color: #6ee7b7; display: block; }
        .test-status.error { background: #7f1d1d; color: #fca5a5; display: block; }
        
        .btn-save {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.125rem;
            font-weight: 600;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status-box {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 6px;
            display: none;
        }
        .status-box.success {
            background: #064e3b;
            color: #6ee7b7;
            border: 1px solid #059669;
            display: block;
        }
        .status-box.error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #dc2626;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯 KAG System</div>
        <div class="subtitle">Первоначальная настройка системы</div>

        <!-- Шаг 1: База данных -->
        <div class="step">
            <div class="step-header">
                <span class="step-num">1</span>
                Настройка базы данных
            </div>
            <div class="grid">
                <div class="field">
                    <label>Хост базы данных</label>
                    <input type="text" id="db-host" value="kag-keycloak-db">
                </div>
                <div class="field">
                    <label>Порт</label>
                    <input type="number" id="db-port" value="5432">
                </div>
                <div class="field">
                    <label>Имя базы данных</label>
                    <input type="text" id="db-name" value="keycloak">
                </div>
                <div class="field">
                    <label>Пользователь</label>
                    <input type="text" id="db-user" value="keycloak">
                </div>
                <div class="field full">
                    <label>Пароль пользователя БД</label>
                    <input type="password" id="db-pass" value="keycloak_password">
                </div>
            </div>
            <button class="btn-test" onclick="testDb()">🔍 Тест подключения к БД</button>
            <div class="test-status" id="db-status"></div>
        </div>

        <!-- Шаг 2: LLM Бэкенд -->
        <div class="step">
            <div class="step-header">
                <span class="step-num">2</span>
                Настройка LLM бэкенда
            </div>
            <div class="grid">
                <div class="field">
                    <label>Тип бэкенда</label>
                    <select id="llm-type" onchange="updateLlmDefaults()">
                        <option value="ollama">Ollama</option>
                        <option value="vllm">vLLM</option>
                    </select>
                </div>
                <div class="field">
                    <label>Порт</label>
                    <input type="number" id="llm-port" value="11434">
                </div>
                <div class="field full">
                    <label>Адрес сервера</label>
                    <input type="text" id="llm-host" value="192.168.50.41">
                </div>
                <div class="field full">
                    <label>Название модели</label>
                    <input type="text" id="llm-model" value="phi4-mini:latest">
                    <div class="hint">Модель должна быть загружена на сервере</div>
                </div>
            </div>
            <button class="btn-test" onclick="testLlm()">🔍 Тест подключения к LLM</button>
            <div class="test-status" id="llm-status"></div>
        </div>

        <!-- Шаг 3: Embedding -->
        <div class="step">
            <div class="step-header">
                <span class="step-num">3</span>
                Настройка Embedding модели
            </div>
            <div class="grid">
                <div class="field full">
                    <label>Название embedding модели</label>
                    <input type="text" id="emb-model" value="qwen3-embedding:4b">
                </div>
                <div class="field">
                    <label>Размерность вектора</label>
                    <input type="number" id="emb-dim" value="4096">
                </div>
            </div>
        </div>

        <!-- Шаг 4: SSH -->
        <div class="step">
            <div class="step-header">
                <span class="step-num">4</span>
                SSH доступ к серверу LLM
            </div>
            <div class="grid">
                <div class="field">
                    <label>SSH пользователь</label>
                    <input type="text" id="ssh-user" value="yartsevn">
                </div>
                <div class="field">
                    <label>SSH пароль</label>
                    <input type="password" id="ssh-pass" placeholder="Введите пароль">
                </div>
                <div class="field full">
                    <label>Пароль для sudo (если отличается)</label>
                    <input type="password" id="ssh-sudo" placeholder="Оставьте пустым, если такой же">
                </div>
            </div>
            <button class="btn-test" onclick="testSsh()">🔍 Тест SSH подключения</button>
            <div class="test-status" id="ssh-status"></div>
        </div>

        <button class="btn-save" id="btn-save" onclick="saveAll()">💾 Сохранить и продолжить</button>
        <div class="status-box" id="final-status"></div>
    </div>

    <script>
        // ==========================================
        // Глобальные переменные
        // ==========================================
        const API = '/api/v1/setup';
        
        // Состояние тестов (для UX)
        const state = {
            dbTested: false,
            llmTested: false,
            sshTested: false
        };

        // ==========================================
        // Вспомогательные функции
        // ==========================================
        
        /**
         * Показывает статус теста
         * @param {string} elementId - ID элемента статуса
         * @param {boolean} success - Успех или ошибка
         * @param {string} message - Текст сообщения
         */
        function showTestStatus(elementId, success, message) {
            const el = document.getElementById(elementId);
            el.textContent = (success ? '✅ ' : '❌ ') + message;
            el.className = 'test-status ' + (success ? 'success' : 'error');
        }

        /**
         * Показывает финальный статус сохранения
         * @param {boolean} success 
         * @param {string} message 
         */
        function showFinalStatus(success, message) {
            const el = document.getElementById('final-status');
            el.textContent = message;
            el.className = 'status-box ' + (success ? 'success' : 'error');
        }

        // ==========================================
        // Тестирование подключений
        // ==========================================

        async function testDb() {
            const payload = {
                host: document.getElementById('db-host').value,
                port: parseInt(document.getElementById('db-port').value),
                name: document.getElementById('db-name').value,
                user: document.getElementById('db-user').value,
                password: document.getElementById('db-pass').value
            };

            showTestStatus('db-status', false, 'Тестирование...');

            try {
                const res = await fetch(`${API}/test-db`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                state.dbTested = data.success;
                showTestStatus('db-status', data.success, data.message);
            } catch (err) {
                state.dbTested = false;
                showTestStatus('db-status', false, 'Ошибка сети: ' + err.message);
            }
        }

        function updateLlmDefaults() {
            const type = document.getElementById('llm-type').value;
            document.getElementById('llm-port').value = type === 'ollama' ? '11434' : '8000';
        }

        async function testLlm() {
            const payload = {
                type: document.getElementById('llm-type').value,
                host: document.getElementById('llm-host').value,
                port: parseInt(document.getElementById('llm-port').value),
                model: document.getElementById('llm-model').value
            };

            showTestStatus('llm-status', false, 'Тестирование...');

            try {
                const res = await fetch(`${API}/test-llm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                state.llmTested = data.success;
                showTestStatus('llm-status', data.success, data.message);
            } catch (err) {
                state.llmTested = false;
                showTestStatus('llm-status', false, 'Ошибка сети: ' + err.message);
            }
        }

        async function testSsh() {
            const payload = {
                username: document.getElementById('ssh-user').value,
                password: document.getElementById('ssh-pass').value,
                sudo_password: document.getElementById('ssh-sudo').value || undefined,
                llm_host: document.getElementById('llm-host').value,
                llm_port: parseInt(document.getElementById('llm-port').value)
            };

            showTestStatus('ssh-status', false, 'Тестирование...');

            try {
                const res = await fetch(`${API}/test-ssh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                state.sshTested = data.success;
                showTestStatus('ssh-status', data.success, data.message);
            } catch (err) {
                state.sshTested = false;
                showTestStatus('ssh-status', false, 'Ошибка сети: ' + err.message);
            }
        }

        // ==========================================
        // Основная функция сохранения
        // ==========================================

        async function saveAll() {
            const btn = document.getElementById('btn-save');
            
            // Валидация обязательных полей
            const requiredFields = [
                { id: 'db-host', label: 'Хост БД' },
                { id: 'db-name', label: 'Имя БД' },
                { id: 'db-user', label: 'Пользователь БД' },
                { id: 'db-pass', label: 'Пароль БД' },
                { id: 'llm-host', label: 'Адрес LLM' },
                { id: 'llm-model', label: 'Модель LLM' },
                { id: 'ssh-user', label: 'SSH пользователь' },
                { id: 'ssh-pass', label: 'SSH пароль' }
            ];

            for (const field of requiredFields) {
                const val = document.getElementById(field.id).value.trim();
                if (!val) {
                    showFinalStatus(false, `⚠️ Заполните поле: ${field.label}`);
                    document.getElementById(field.id).focus();
                    return;
                }
            }

            // Формирование payload
            const payload = {
                database: {
                    host: document.getElementById('db-host').value.trim(),
                    port: parseInt(document.getElementById('db-port').value) || 5432,
                    name: document.getElementById('db-name').value.trim(),
                    user: document.getElementById('db-user').value.trim(),
                    password: document.getElementById('db-pass').value
                },
                llm: {
                    type: document.getElementById('llm-type').value,
                    host: document.getElementById('llm-host').value.trim(),
                    port: parseInt(document.getElementById('llm-port').value) || 11434,
                    model: document.getElementById('llm-model').value.trim()
                },
                embedding: {
                    model: document.getElementById('emb-model').value.trim(),
                    dimensions: parseInt(document.getElementById('emb-dim').value) || 4096
                },
                ssh: {
                    username: document.getElementById('ssh-user').value.trim(),
                    password: document.getElementById('ssh-pass').value,
                    sudo_password: document.getElementById('ssh-sudo').value || undefined
                }
            };

            // UI: Блокируем кнопку
            btn.disabled = true;
            btn.textContent = '⏳ Сохранение...';
            showFinalStatus(false, 'Сохранение настроек...');

            try {
                console.log('Отправка данных:', payload);

                const res = await fetch(`${API}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                console.log('Ответ сервера:', res.status);

                const data = await res.json();
                console.log('Данные:', data);

                if (res.ok && data.success) {
                    showFinalStatus(true, '✅ Настройки успешно сохранены! Перенаправление...');
                    
                    // Ждем 2 секунды и редиректим на главную
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    const errorMsg = data.detail || data.message || 'Неизвестная ошибка';
                    showFinalStatus(false, `❌ Ошибка: ${errorMsg}`);
                    btn.disabled = false;
                    btn.textContent = '💾 Сохранить и продолжить';
                }
            } catch (err) {
                console.error('Ошибка сохранения:', err);
                showFinalStatus(false, `❌ Ошибка сети: ${err.message}`);
                btn.disabled = false;
                btn.textContent = '💾 Сохранить и продолжить';
            }
        }

        // ==========================================
        // Проверка при загрузке страницы
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Проверяем, не настроена ли уже система
                const res = await fetch(`${API}/check`);
                const data = await res.json();
                
                if (data.configured) {
                    // Система уже настроена, идем на главную
                    window.location.href = '/';
                }
            } catch (err) {
                console.warn('Не удалось проверить статус настройки:', err);
            }
        });
    </script>
</body>
</html>
