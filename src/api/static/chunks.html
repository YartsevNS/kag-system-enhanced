<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG - Просмотр чанков</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: #1e293b;
            padding: 1rem 2rem;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f59e0b;
        }
        .nav-buttons {
            display: flex;
            gap: 0.5rem;
        }
        .back-btn, .nav-btn {
            background: #475569;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover, .nav-btn:hover { background: #64748b; }
        .container { max-width: 1800px; margin: 1rem auto; padding: 0 1rem; }
        
        .stats-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1e293b;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .stat-label { font-size: 0.75rem; color: #94a3b8; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #f59e0b; }
        
        .controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            width: 300px;
        }
        .btn {
            background: #f59e0b;
            color: black;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .btn:hover { background: #d97706; }
        .btn-secondary { background: #475569; color: white; }
        .btn-secondary:hover { background: #64748b; }
        
        .chunks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }
        
        .chunk-card {
            background: #1e293b;
            border-radius: 8px;
            border: 1px solid #334155;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chunk-card:hover {
            border-color: #f59e0b;
            transform: translateY(-2px);
        }
        
        .chunk-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
        }
        .doc-id { color: #64748b; font-family: monospace; }
        .chunk-id { color: #f59e0b; font-family: monospace; }
        
        .chunk-content-preview {
            font-size: 0.875rem;
            color: #cbd5e1;
            max-height: 80px;
            overflow: hidden;
            white-space: pre-wrap;
            font-family: monospace;
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 4px;
            line-height: 1.4;
        }
        
        .chunk-meta {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: #64748b;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .meta-tag {
            background: #334155;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 1rem;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        
        .full-content {
            font-family: monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            line-height: 1.5;
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .metadata-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
        .metadata-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #f59e0b;
        }
        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.5rem;
            font-size: 0.75rem;
        }
        .metadata-item {
            background: #0f172a;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .meta-key { color: #64748b; }
        .meta-value { color: #e2e8f0; }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        
        .pagination {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📚 KAG - Чанки документов</div>
        <div class="nav-buttons">
            <a href="/" class="nav-btn">💬 Чат</a>
            <a href="/documents" class="nav-btn">📄 Документы</a>
            <a href="/qdrant" class="nav-btn">🗄️ Qdrant</a>
            <a href="/docker" class="nav-btn">🐳 Docker</a>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-bar" id="stats"></div>
        
        <div class="controls">
            <input type="text" id="search" class="search-input" placeholder="Поиск по содержимому или ID...">
            <button class="btn" onclick="loadChunks()">🔍 Найти</button>
            <button class="btn btn-secondary" onclick="loadChunks()">🔄 Обновить</button>
        </div>
        
        <div id="loading" class="loading">Загрузка чанков...</div>
        <div class="chunks-grid" id="chunks-grid"></div>
        
        <div class="pagination" id="pagination"></div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Чанк</div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="full-content" id="modal-content"></div>
                <div class="metadata-section">
                    <div class="metadata-title">Метаданные</div>
                    <div class="metadata-grid" id="modal-meta"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = '';
        let allChunks = [];
        let filteredChunks = [];
        
        async function loadChunks() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('chunks-grid').innerHTML = '';
            
            try {
                const chunks = await fetchChunksRecursive();
                allChunks = chunks;
                renderStats(chunks.length);
                applyFilter();
            } catch (error) {
                document.getElementById('loading').textContent = 'Ошибка: ' + error.message;
            }
        }
        
        async function fetchChunksRecursive() {
            const chunks = [];
            let offset = 0;
            const limit = 100;
            
            while (true) {
                try {
                    const resp = await fetch(
                        `${API_URL}/api/v1/admin/models/qdrant/collections/kag_documents/chunks?limit=${limit}&offset=${offset}`
                    );
                    const data = await resp.json();
                    
                    if (!data.chunks || data.chunks.length === 0) break;
                    
                    chunks.push(...data.chunks);
                    offset += limit;
                } catch (e) {
                    break;
                }
            }
            
            return chunks;
        }
        
        function renderStats(total) {
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Всего чанков</div>
                    <div class="stat-value">${total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Документов</div>
                    <div class="stat-value">${new Set(allChunks.map(c => c.payload?.document_id)).size}</div>
                </div>
            `;
        }
        
        function applyFilter() {
            const search = document.getElementById('search').value.toLowerCase();
            
            if (search) {
                filteredChunks = allChunks.filter(c => {
                    const content = c.payload?.content || '';
                    const docId = c.payload?.document_id || '';
                    const chunkId = c.payload?.chunk_id || '';
                    return content.toLowerCase().includes(search) || 
                           docId.toLowerCase().includes(search) ||
                           chunkId.toLowerCase().includes(search);
                });
            } else {
                filteredChunks = allChunks;
            }
            
            renderChunks();
        }
        
        function renderChunks() {
            document.getElementById('loading').style.display = 'none';
            
            const grid = document.getElementById('chunks-grid');
            
            if (filteredChunks.length === 0) {
                grid.innerHTML = '<div class="loading">Чанки не найдены</div>';
                return;
            }
            
            grid.innerHTML = filteredChunks.map((chunk, idx) => {
                const p = chunk.payload || {};
                const content = p.content || '';
                const preview = content.length > 300 ? content.substring(0, 300) + '...' : content;
                
                return `
                    <div class="chunk-card" onclick="showChunk(${idx})">
                        <div class="chunk-header">
                            <span class="doc-id">${truncate(p.document_id || '-', 12)}</span>
                            <span class="chunk-id">${p.chunk_id || '-'}</span>
                        </div>
                        <div class="chunk-content-preview">${escapeHtml(preview)}</div>
                        <div class="chunk-meta">
                            <span class="meta-tag">${p.file_type || '-'}</span>
                            <span class="meta-tag">${content.length} симв.</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showChunk(idx) {
            const chunk = filteredChunks[idx];
            const p = chunk.payload || {};
            
            document.getElementById('modal-title').textContent = p.chunk_id || 'Чанк';
            document.getElementById('modal-content').textContent = p.content || 'Нет содержимого';
            
            const meta = [];
            for (const [key, value] of Object.entries(p)) {
                if (key !== 'content' && key !== 'created_at') {
                    meta.push(`<div class="metadata-item"><span class="meta-key">${key}:</span> <span class="meta-value">${truncate(String(value), 50)}</span></div>`);
                }
            }
            document.getElementById('modal-meta').innerHTML = meta.join('');
            
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.substring(0, len) + '...' : str;
        }
        
        document.getElementById('search').addEventListener('keyup', e => {
            if (e.key === 'Enter') applyFilter();
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'Escape') closeModal();
        });
        
        loadChunks();
    </script>
</body>
</html>
