<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAG — Чанки документа</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--elevated:#23252a;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent-h:#7170ff;--accent-l:#828fff;--green:#27a644;--emerald:#10b981;--red:#dc2626;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px;--radius-lg:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
nav{width:240px;background:var(--panel);border-right:1px solid var(--border-s);position:fixed;height:100vh;z-index:10;padding:20px 0}
nav .logo{padding:0 24px 20px;font-size:18px;font-weight:600;letter-spacing:-0.4px;color:var(--text);border-bottom:1px solid var(--border-s);margin-bottom:12px}
nav .logo span{color:var(--accent-h)}
nav a{display:flex;align-items:center;gap:10px;padding:8px 24px;color:var(--text3);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.15s}
nav a:hover{color:var(--text2);background:rgba(255,255,255,0.04)}
nav a.active{color:var(--text);background:rgba(255,255,255,0.06)}
main{margin-left:240px;flex:1;padding:32px 40px;max-width:1200px}
h1{font-size:28px;font-weight:600;letter-spacing:-0.6px;margin-bottom:4px}
.breadcrumb{font-size:13px;color:var(--text4);margin-bottom:24px}
.breadcrumb a{color:var(--accent-h);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
/* Controls */
.controls{display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.limit-select{display:flex;align-items:center;gap:8px}
.limit-select label{font-size:13px;color:var(--text4)}
.limit-select select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.limit-select select:focus{border-color:var(--accent-h)}
.chunk-count{font-size:13px;color:var(--text4)}
.chunk-count strong{color:var(--text2)}
/* Chunk card */
.chunk-card{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.chunk-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--panel);border-bottom:1px solid var(--border-s)}
.chunk-header .chunk-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent-l);font-weight:500}
.chunk-header .chunk-meta{font-size:11px;color:var(--text4)}
.chunk-body{padding:16px 20px}
.chunk-body pre{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.6;max-height:300px;overflow-y:auto}
.chunk-body pre::-webkit-scrollbar{width:6px}
.chunk-body pre::-webkit-scrollbar-track{background:transparent}
.chunk-body pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text4)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-text{font-size:15px;color:var(--text4)}
/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px}
.pagination button{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--radius-sm);padding:8px 14px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s}
.pagination button:hover:not(:disabled){background:var(--elevated);border-color:var(--border)}
.pagination button:disabled{opacity:0.4;cursor:not-allowed}
.pagination .page-info{font-size:13px;color:var(--text4);min-width:80px;text-align:center}
/* Loading */
.loading{text-align:center;padding:40px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top:2px solid var(--accent-h);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){nav{width:60px}nav a span,nav .logo{display:none}main{margin-left:60px;padding:20px 16px}.controls{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<nav>
  <div class="logo">🎯 <span>KAG</span></div>
    <a href="/">⬡ Дашборд</a>
  <a href="/documents">📄 Документы</a>
  <a href="/chunks">🧩 Чанки</a>
  <a href="/search">🔎 Поиск</a>
  <a href="/kg">🕸️ Граф знаний</a>
  <a href="/logs">📋 Логи</a>
  <a href="/admin">⚙️ Админ</a>
  <a href="/docs">📖 Документация</a>
</nav>

<main>
  <h1 id="page-title">📄 Чанки документов</h1>
  <div class="breadcrumb" id="breadcrumb">
    <a href="/documents">← К списку документов</a>
  </div>

  <div class="controls">
    <div class="limit-select">
      <label>Показывать:</label>
      <select id="limit-select" onchange="changeLimit()">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
      <label>чанков</label>
    </div>
    <div class="chunk-count" id="chunk-count"></div>
  </div>

  <div id="chunks-container">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <div class="pagination" id="pagination" style="display:none"></div>
</main>

<script>
const API = '/api/v1';
const params = new URLSearchParams(window.location.search);
const DOC_ID = params.get('doc_id');
const DOC_NAME = params.get('name') || 'Документ';

let currentPage = 0;
let currentLimit = 10;
let totalChunks = 0;

if (DOC_ID) {
  document.getElementById('page-title').textContent = '📄 Чанки: ' + DOC_NAME;
  document.getElementById('breadcrumb').innerHTML = 
    '<a href="/documents">← К списку документов</a> &nbsp;›&nbsp; ' + DOC_NAME;
}

function changeLimit() {
  currentLimit = parseInt(document.getElementById('limit-select').value);
  currentPage = 0;
  loadChunks();
}

async function loadChunks() {
  const container = document.getElementById('chunks-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const apiUrl = DOC_ID 
      ? `${API}/upload/${DOC_ID}/chunks?offset=${currentPage * currentLimit}&limit=${currentLimit}`
      : `${API}/chunks?offset=${currentPage * currentLimit}&limit=${currentLimit}`;

    const resp = await fetch(apiUrl);
    
    if (!resp.ok) {
      // Fallback: try searching via Qdrant
      const searchData = DOC_ID 
        ? { doc_id: DOC_ID, limit: currentLimit, offset: currentPage * currentLimit }
        : { limit: currentLimit, offset: currentPage * currentLimit };
      
      const searchResp = await fetch(`${API}/chat/search`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query: '', filters: searchData})
      });
      
      if (searchResp.ok) {
        const data = await searchResp.json();
        renderChunks(data.chunks || data.results || [], data.total || 0);
      } else {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Не удалось загрузить чанки</div></div>';
      }
      return;
    }
    
    const data = await resp.json();
    renderChunks(data.chunks || data.items || [], data.total || data.count || 0);
    
  } catch (err) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Ошибка: ' + err.message + '</div></div>';
  }
}

function renderChunks(chunks, total) {
  totalChunks = total || chunks.length;
  const container = document.getElementById('chunks-container');
  
  document.getElementById('chunk-count').innerHTML = 
    'Всего: <strong>' + totalChunks + '</strong> чанков' +
    (DOC_ID ? ' для этого документа' : '');
  
  if (!chunks.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">' +
      (DOC_ID ? 'У этого документа нет чанков' : 'Чанки не найдены') + '</div></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  container.innerHTML = chunks.map((c, i) => {
    const text = c.text || c.content || c.chunk_text || JSON.stringify(c);
    const seq = c.chunk_seq || c.metadata?.chunk_seq || (c.chunk_id || '').replace('chunk_', '');
    const id = c.chunk_id || c.id || `#${currentPage * currentLimit + i + 1}`;
    return `<div class="chunk-card">
      <div class="chunk-header">
        <span class="chunk-id">Чанк #${seq} <span style="color:var(--text4);font-weight:400">(${id})</span></span>
        <span class="chunk-meta">${text.length} символов</span>
      </div>
      <div class="chunk-body"><pre>${escapeHtml(text)}</pre></div>
    </div>`;
  }).join('');

  // Pagination
  const totalPages = Math.ceil(totalChunks / currentLimit);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) {
    pag.style.display = 'none';
  } else {
    pag.style.display = 'flex';
    pag.innerHTML = `
      <button onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>← Назад</button>
      <span class="page-info">${currentPage + 1} / ${totalPages}</span>
      <button onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Вперёд →</button>
    `;
  }
}

function goPage(n) {
  currentPage = Math.max(0, n);
  loadChunks();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

loadChunks();
</script>
</body>
</html>
