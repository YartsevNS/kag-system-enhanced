<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG - Управление документами</title>
    <style>
        :root{--bg:#08090a;--panel:#0f1011;--surface:#191a1b;--elevated:#23252a;--text:#f7f8f8;--text2:#d0d6e0;--text3:#8a8f98;--text4:#62666d;--accent:#5e6ad2;--accent-h:#7170ff;--green:#27a644;--emerald:#10b981;--red:#dc2626;--border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.05);--radius:8px;--radius-sm:6px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}

        /* Sidebar Navigation */
        nav{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;flex-shrink:0}
        nav .logo{font-size:1.25rem;font-weight:700;margin-bottom:2rem;display:flex;align-items:center;gap:0.5rem}
        nav .logo span{background:linear-gradient(135deg,var(--accent),var(--accent-h));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        nav a{display:flex;align-items:center;gap:0.5rem;padding:0.6rem 0.75rem;border-radius:var(--radius-sm);color:var(--text3);text-decoration:none;font-size:0.875rem;transition:all 0.15s;margin-bottom:0.15rem}
        nav a:hover{background:var(--surface);color:var(--text2)}
        nav a.active{background:var(--accent);color:#fff}

        /* Main Content */
        main{flex:1;overflow-y:auto;padding:2rem}

        /* Upload Section */
        .upload-section{background:var(--panel);border-radius:var(--radius);border:1px solid var(--border);padding:2rem;margin-bottom:2rem}
        .upload-section h2{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--text2)}
        .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:3rem;text-align:center;cursor:pointer;transition:all 0.2s}
        .upload-area:hover{border-color:var(--accent);background:var(--surface)}
        .upload-icon{font-size:3rem;margin-bottom:1rem}
        .upload-text{font-size:1.05rem;color:var(--text2);margin-bottom:0.5rem}
        .upload-hint{font-size:0.8rem;color:var(--text4)}
        .upload-form{display:none}

        /* Progress Bar */
        .progress-container{margin-top:1rem;display:none}
        .progress-container .label{font-size:0.8rem;color:var(--text3);margin-bottom:0.5rem}
        .progress-bar{width:100%;height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s;width:0%}

        /* Documents Table */
        .section{background:var(--panel);border-radius:var(--radius);border:1px solid var(--border);padding:1.5rem;margin-bottom:2rem}
        .section-title{font-size:1.1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;color:var(--text2)}
        table{width:100%;border-collapse:collapse}
        th,td{padding:0.75rem;text-align:left;border-bottom:1px solid var(--border-s);font-size:0.8125rem}
        th{color:var(--text4);font-weight:500;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.03em}
        td{color:var(--text2)}
        tr:hover{background:var(--surface)}
        tr:last-child td{border-bottom:none}

        .badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.7rem;font-weight:500}
        .badge-success{background:rgba(39,166,68,0.15);color:var(--green)}
        .badge-error{background:rgba(220,38,38,0.15);color:var(--red)}
        .badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b}
        .badge-info{background:rgba(94,106,210,0.15);color:var(--accent)}

        .action-btn{padding:0.35rem 0.65rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:0.75rem;transition:all 0.15s}
        .btn-delete{background:rgba(220,38,38,0.12);color:var(--red)}
        .btn-delete:hover{background:rgba(220,38,38,0.25)}
        .btn-refresh{background:var(--accent);color:#fff;padding:0.5rem 1rem;font-size:0.8125rem}
        .btn-refresh:hover{background:var(--accent-h)}

        .btn{padding:0.65rem 1.25rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:0.8125rem;font-weight:500;background:var(--accent);color:#fff;margin-top:1rem;transition:all 0.15s}
        .btn:hover{background:var(--accent-h)}
        .btn:disabled{opacity:0.4;cursor:not-allowed}

        .loading{text-align:center;padding:2rem;color:var(--text4);font-size:0.875rem}
        .empty-state{padding:2rem;text-align:center;color:var(--text4);font-size:0.875rem}

        .notification{position:fixed;top:2rem;right:2rem;padding:0.75rem 1.25rem;border-radius:var(--radius);background:var(--green);color:#fff;display:none;z-index:1000;font-size:0.875rem;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
    </style>
</head>
<body>
    <nav>
        <div class="logo">🎯 <span>KAG</span></div>
        <a href="/">⬡ Дашборд</a>
        <a href="/chat">💬 Чат с AI</a>
        <a href="/documents" class="active">📄 Документы</a>
        <a href="/ocr">🔍 OCR-демо</a>
        <a href="/monitoring">📡 Мониторинг</a>
        <a href="/users">👥 Пользователи</a>
        <a href="/admin">⚙️ Админ</a>
    </nav>

    <main>
        <!-- Upload Section -->
        <div class="upload-section">
            <h2>⬆️ Загрузка документов</h2>
            
            <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Перетащите файлы сюда или нажмите для выбора</div>
                <div class="upload-hint">Поддерживаемые форматы: PDF, TXT, MD, DOCX, CSV</div>
            </div>
            
            <input type="file" id="file-input" class="upload-form" multiple accept=".pdf,.txt,.md,.docx,.csv">
            
            <div class="progress-container" id="progress-container">
                <div class="label">Загрузка... <span id="progress-percent">0%</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Documents List -->
        <div class="section">
            <div class="section-title">
                <span>📋 Загруженные документы</span>
                <button class="action-btn btn-refresh" onclick="loadDocuments()">🔄 Обновить</button>
            </div>
            <div id="documents-table">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </main>

    <div class="notification" id="notification"></div>

    <script>
        const API_URL = '/api/v1';

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadDocuments();
            setupDragAndDrop();
            setupFileInput();
        });

        function setupDragAndDrop() {
            const area = document.getElementById('upload-area');
            
            area.addEventListener('dragover', (e) => {
                e.preventDefault();
                area.style.borderColor = '#5e6ad2';
            });
            
            area.addEventListener('dragleave', () => {
                area.style.borderColor = '';
            });
            
            area.addEventListener('drop', (e) => {
                e.preventDefault();
                area.style.borderColor = '';
                const files = Array.from(e.dataTransfer.files);
                uploadFiles(files);
            });
        }

        function setupFileInput() {
            const input = document.getElementById('file-input');
            input.addEventListener('change', () => {
                const files = Array.from(input.files);
                uploadFiles(files);
            });
        }

        async function uploadFiles(files) {
            if (files.length === 0) return;

            const progressContainer = document.getElementById('progress-container');
            const progressFill = document.getElementById('progress-fill');
            const progressPercent = document.getElementById('progress-percent');
            
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(`${API_URL}/upload/`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`Ошибка загрузки ${file.name}`);
                    }

                    await response.json();
                    showNotification(`✅ ${file.name} загружен`);
                    
                    const percent = ((i + 1) / files.length) * 100;
                    progressFill.style.width = percent + '%';
                    progressPercent.textContent = Math.round(percent) + '%';
                    
                } catch (error) {
                    showNotification(`❌ ${file.name}: ${error.message}`, true);
                }
            }

            setTimeout(() => {
                progressContainer.style.display = 'none';
                loadDocuments();
            }, 1000);
        }

        async function loadDocuments() {
            try {
                const response = await fetch(`${API_URL}/upload/list`);
                const data = await response.json();

                if (data.documents.length === 0) {
                    document.getElementById('documents-table').innerHTML = 
                        '<div class="empty-state">Нет загруженных документов</div>';
                    return;
                }

                document.getElementById('documents-table').innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Имя файла</th>
                                <th>Тип</th>
                                <th>Размер</th>
                                <th>Статус</th>
                                <th>Прогресс</th>
                                <th>Чанков</th>
                                <th>Дата</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.documents.map(doc => `
                                <tr>
                                    <td><strong>${doc.filename}</strong></td>
                                    <td>${doc.file_type}</td>
                                    <td>${formatBytes(doc.file_size)}</td>
                                    <td>
                                        <span class="badge ${getStatusBadge(doc.status)}">
                                            ${getStatusText(doc.status)}
                                        </span>
                                    </td>
                                    <td>
                                        <div class="progress-bar" style="width: 100px; display: inline-block; vertical-align: middle; margin-right: 8px;">
                                            <div class="progress-fill" style="width: ${doc.progress}%"></div>
                                        </div>
                                        ${doc.progress}%
                                    </td>
                                    <td>${doc.chunks_count || '-'}</td>
                                    <td>${new Date(doc.created_at).toLocaleString('ru-RU')}</td>
                                    <td>
                                        <button class="action-btn btn-delete" onclick="deleteDocument('${doc.document_id}')">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('Ошибка загрузки документов:', error);
            }
        }

        async function deleteDocument(docId) {
            if (!confirm('Удалить этот документ?')) return;

            try {
                const response = await fetch(`${API_URL}/upload/${docId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showNotification('✅ Документ удален');
                    loadDocuments();
                } else {
                    showNotification('❌ Ошибка удаления', true);
                }
            } catch (error) {
                showNotification(`❌ Ошибка: ${error.message}`, true);
            }
        }

        function getStatusBadge(status) {
            const badges = {
                'pending': 'badge-info',
                'processing': 'badge-warning',
                'completed': 'badge-success',
                'failed': 'badge-error'
            };
            return badges[status] || 'badge-info';
        }

        function getStatusText(status) {
            const texts = {
                'pending': '⏳ Ожидает',
                'processing': '⚙️ Обработка',
                'completed': '✅ Готово',
                'failed': '❌ Ошибка'
            };
            return texts[status] || status;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.style.background = isError ? '#dc2626' : '#27a644';
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Автообновление каждые 5 секунд
        setInterval(loadDocuments, 5000);
    </script>
</body>
</html>
